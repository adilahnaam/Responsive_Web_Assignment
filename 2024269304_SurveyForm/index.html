<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Survey Form</title>
</head>
<body>

  <h1 id="title">Movie Preference Survey</h1>

  <p id="description">
    Help us understand your movie preferences by filling out this short survey.
  </p>

  <form id="survey-form">

    <!-- Name -->
    <label id="name-label" for="name">Name</label>
    <input 
      type="text" 
      id="name" 
      placeholder="Enter your name"
      required>

    <br><br>

    <!-- Email -->
    <label id="email-label" for="email">Email</label>
    <input 
      type="email" 
      id="email" 
      placeholder="Enter your email"
      required>

    <br><br>

    <!-- Number -->
    <label id="number-label" for="number">Age</label>
    <input 
      type="number" 
      id="number" 
      placeholder="Enter your age"
      min="10"
      max="80">

    <br><br>

    <!-- Dropdown -->
    <label for="dropdown">Favorite Movie Genre</label>
    <select id="dropdown">
      <option value="action">Action</option>
      <option value="romance">Romance</option>
    </select>

    <br><br>

    <!-- Radio -->
    <p>How often do you watch movies?</p>

    <label>
      <input type="radio" name="watch" value="daily"> Daily
    </label>

    <label>
      <input type="radio" name="watch" value="weekly"> Weekly
    </label>

    <br><br>

    <!-- Checkbox -->
    <p>Which platforms do you use?</p>

    <label>
      <input type="checkbox" value="netflix"> Netflix
    </label>

    <label>
      <input type="checkbox" value="cinema"> Cinema
    </label>

    <br><br>

    <!-- Textarea -->
    <label for="comments">Comments</label>
    <br>
    <textarea id="comments" rows="4" cols="30"></textarea>

    <br><br>

    <!-- Submit -->
    <button id="submit" type="submit">Submit</button>

  </form>

</body>
</html>
